name: Deploy Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown links
        shell: pwsh
        run: |
          $root = 'wiki'
          $md = Get-ChildItem -Path $root -Recurse -Filter *.md
          $broken = @()

          foreach($f in $md) {
            $content = Get-Content -Raw -Path $f.FullName
            $matches = [regex]::Matches($content, '\[[^\]]+\]\(([^)]+)\)')

            foreach($m in $matches) {
              $target = $m.Groups[1].Value.Trim()
              $target = $target.TrimStart('<').TrimEnd('>')

              if($target -match '^(https?:|mailto:|#)') { continue }

              $targetPath = $target.Split('#')[0].Trim()
              if([string]::IsNullOrWhiteSpace($targetPath)) { continue }

              $resolved = Join-Path $f.DirectoryName $targetPath
              if(-not (Test-Path -LiteralPath $resolved)) {
                $broken += [pscustomobject]@{
                  File = $f.FullName
                  Link = $m.Groups[1].Value
                  Target = $resolved
                }
              }
            }
          }

          Write-Output "## Link Check Results"
          Write-Output "Checked: $($md.Count) files"
          Write-Output "Broken links found: $($broken.Count)"

          if($broken.Count -gt 0) {
            Write-Output ""
            Write-Output "### Broken Links:"
            $broken | Sort-Object File | ForEach-Object {
              Write-Output "- $($_.File) :: $($_.Link) => $($_.Target)"
            }
            exit 1
          }

  build:
    needs: check-links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
